apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "clawmachine.fullname" . }}-default-deny
  labels:
    {{- include "clawmachine.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "clawmachine.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "clawmachine.fullname" . }}-allow-dns
  labels:
    {{- include "clawmachine.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "clawmachine.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "clawmachine.fullname" . }}-allow-apiserver
  labels:
    {{- include "clawmachine.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "clawmachine.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "clawmachine.fullname" . }}-allow-ingress
  labels:
    {{- include "clawmachine.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "clawmachine.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: http
