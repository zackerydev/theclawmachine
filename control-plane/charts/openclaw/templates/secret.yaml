{{/* 
  Bot secrets are created out-of-band by the ClawMachine control plane
  via the Kubernetes API (not through Helm values) for security.
  The deployment references them via externalSecretName.
  This template is kept as a fallback for standalone Helm installs.
*/}}
{{- if not .Values.externalSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openclaw.fullname" . }}-secrets
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.gatewayToken }}
  OPENCLAW_GATEWAY_TOKEN: {{ .Values.secrets.gatewayToken | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.discordBotToken }}
  DISCORD_BOT_TOKEN: {{ .Values.secrets.discordBotToken | quote }}
  {{- end }}
  {{- if .Values.secrets.telegramBotToken }}
  TELEGRAM_BOT_TOKEN: {{ .Values.secrets.telegramBotToken | quote }}
  {{- end }}
  {{- if .Values.secrets.slackBotToken }}
  SLACK_BOT_TOKEN: {{ .Values.secrets.slackBotToken | quote }}
  {{- end }}
{{- end }}
