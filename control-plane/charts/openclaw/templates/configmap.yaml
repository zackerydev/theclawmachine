apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openclaw.fullname" . }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
data:
  BOT_TYPE: openclaw
  OPENCLAW_HOME: {{ .Values.openclawHome | quote }}
  OPENCLAW_VERSION: {{ .Values.openclawVersion | quote }}
  GATEWAY_PORT: {{ .Values.gateway.port | quote }}
  GATEWAY_BIND: "lan"
  GATEWAY_AUTH_MODE: {{ .Values.gateway.authMode | quote }}
  AUTH_CHOICE: {{ .Values.auth.choice | quote }}
  {{- if .Values.auth.model }}
  AUTH_MODEL: {{ .Values.auth.model | quote }}
  {{- end }}
  {{- if .Values.agent.name }}
  AGENT_NAME: {{ .Values.agent.name | quote }}
  {{- end }}
  {{- if .Values.agent.defaultModel }}
  AGENT_DEFAULT_MODEL: {{ .Values.agent.defaultModel | quote }}
  {{- end }}
  {{- if .Values.channels.discord.enabled }}
  CHANNEL_DISCORD: "true"
  {{- end }}
  {{- if .Values.channels.telegram.enabled }}
  CHANNEL_TELEGRAM: "true"
  {{- end }}
  {{- if .Values.channels.slack.enabled }}
  CHANNEL_SLACK: "true"
  {{- end }}
  {{- if .Values.secrets.cloudflareAccountId }}
  CF_AI_GATEWAY_ACCOUNT_ID: {{ .Values.secrets.cloudflareAccountId | quote }}
  {{- end }}
  {{- if .Values.secrets.cloudflareGatewayId }}
  CF_AI_GATEWAY_GATEWAY_ID: {{ .Values.secrets.cloudflareGatewayId | quote }}
  {{- end }}
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
