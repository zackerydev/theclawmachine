{{- if not .Values.secrets.external }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ironclaw.fullname" . }}
  labels:
    {{- include "ironclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.postgresql.enabled }}
  {{- $pgPassword := required "ironclaw: postgresql.password must be set when postgresql.enabled=true" .Values.postgresql.password }}
  DATABASE_URL: {{ printf "postgres://%s:%s@%s-postgres:5432/%s?sslmode=disable" .Values.postgresql.username $pgPassword (include "ironclaw.fullname" .) .Values.postgresql.database | quote }}
  {{- else }}
  DATABASE_URL: {{ .Values.database.url | quote }}
  {{- end }}
  GATEWAY_AUTH_TOKEN: {{ .Values.secrets.gatewayAuthToken | quote }}
  {{- if .Values.secrets.nearaiSessionToken }}
  NEARAI_SESSION_TOKEN: {{ .Values.secrets.nearaiSessionToken | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  {{- end }}
{{- end }}
