apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ironclaw.fullname" . }}-default-deny
  labels:
    {{- include "ironclaw.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ironclaw.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ironclaw.fullname" . }}-allow-dns
  labels:
    {{- include "ironclaw.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ironclaw.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
{{- if .Values.networkPolicy.ingress }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ironclaw.fullname" . }}-allow-ingress
  labels:
    {{- include "ironclaw.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ironclaw.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.service.port | default 3000 }}
{{- end }}
{{- if and .Values.networkPolicy.ingress .Values.postgresql.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ironclaw.fullname" . }}-allow-postgres
  labels:
    {{- include "ironclaw.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ironclaw.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: database
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "ironclaw.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ironclaw.fullname" . }}-allow-egress
  labels:
    {{- include "ironclaw.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ironclaw.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  {{- if .Values.networkPolicy.egress }}
  egress:
    - {}
  {{- else }}
  egress: []
  {{- end }}
