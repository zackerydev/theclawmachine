{{- if .Values.postgresql.enabled }}
{{- $pgPassword := required "ironclaw: postgresql.password must be set when postgresql.enabled=true" .Values.postgresql.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ironclaw.fullname" . }}-postgres
  labels:
    {{- include "ironclaw.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
type: Opaque
stringData:
  password: {{ $pgPassword | quote }}
{{- end }}
