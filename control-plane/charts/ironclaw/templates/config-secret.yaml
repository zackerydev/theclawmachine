{{- if .Values.configFile.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ironclaw.fullname" . }}-config
  labels:
    {{- include "ironclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.configFile.fileName }}: {{ .Values.configFile.content | quote }}
{{- end }}
