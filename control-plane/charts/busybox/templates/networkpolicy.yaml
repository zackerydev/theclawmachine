apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "busybox.fullname" . }}
  labels:
    {{- include "busybox.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "busybox.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  {{- if .Values.networkPolicy.ingress }}
  ingress:
    - {}
  {{- end }}
  egress:
    # Always allow DNS resolution (kube-dns)
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
  {{- if .Values.networkPolicy.egress }}
    # Allow all egress when explicitly enabled
    - {}
  {{- end }}
