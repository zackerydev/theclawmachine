# https://lefthook.dev
pre-commit:
  parallel: true
  commands:
    vet:
      glob: "*.go"
      run: mise run vet
    fix:
      glob: "*.go"
      run: mise run fix
    lint:
      glob: "*.go"
      run: mise run lint
    charts:
      glob: "charts/**/*"
      run: mise run charts
    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: actionlint

