version: 2

project_name: clawmachine

before:
  hooks:
    - bash .config/scripts/stamp-version.sh {{ .Version }}
    - mise run charts

builds:
  - id: clawmachine
    dir: control-plane
    main: ./cmd/clawmachine/
    binary: clawmachine
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

homebrew_casks:
  - repository:
      owner: zackerydev
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: https://github.com/zackerydev/theclawmachine
    description: Kubernetes-native dashboard for AI bots

dockers_v2:
  - dockerfile: .config/Dockerfile.release
    images:
      - ghcr.io/zackerydev/theclawmachine
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
    extra_files:
      - control-plane
  - id: openclaw
    dockerfile: docker/openclaw/Dockerfile
    images:
      - ghcr.io/zackerydev/openclaw
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: "openclaw"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
  - id: picoclaw
    dockerfile: docker/picoclaw/Dockerfile
    images:
      - ghcr.io/zackerydev/picoclaw
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: "picoclaw"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
  - id: ironclaw
    dockerfile: docker/ironclaw/Dockerfile
    images:
      - ghcr.io/zackerydev/ironclaw
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: "ironclaw"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
  - id: toolbox
    dockerfile: docker/toolbox/Dockerfile
    images:
      - ghcr.io/zackerydev/theclawmachine-toolbox
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: "theclawmachine-toolbox"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.source: "{{ .GitURL }}"

release:
  github:
    owner: zackerydev
    name: theclawmachine
  prerelease: auto
  name_template: "v{{ .Version }}"
