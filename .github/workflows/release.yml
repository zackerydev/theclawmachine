name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  pages: write

jobs:
  release-cli:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2

      - name: Cache Go modules and build cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-release-${{ hashFiles('control-plane/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-release-
            ${{ runner.os }}-go-

      - name: Validate release image contract
        run: mise run release:image-contract

      - name: Run GoReleaser (artifacts only)
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: latest
          args: release --clean --skip=docker
          workdir: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  release-images:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/zackerydev/theclawmachine
            dockerfile: .config/Dockerfile.release
            title: clawmachine
            runner: ubuntu-latest
            platform: linux/amd64
            goarch: amd64
          - image: ghcr.io/zackerydev/theclawmachine
            dockerfile: .config/Dockerfile.release
            title: clawmachine
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            goarch: arm64
          - image: ghcr.io/zackerydev/openclaw
            dockerfile: docker/openclaw/Dockerfile
            title: openclaw
            runner: ubuntu-latest
            platform: linux/amd64
            goarch: amd64
          - image: ghcr.io/zackerydev/openclaw
            dockerfile: docker/openclaw/Dockerfile
            title: openclaw
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            goarch: arm64
          - image: ghcr.io/zackerydev/picoclaw
            dockerfile: docker/picoclaw/Dockerfile
            title: picoclaw
            runner: ubuntu-latest
            platform: linux/amd64
            goarch: amd64
          - image: ghcr.io/zackerydev/picoclaw
            dockerfile: docker/picoclaw/Dockerfile
            title: picoclaw
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            goarch: arm64
          - image: ghcr.io/zackerydev/ironclaw
            dockerfile: docker/ironclaw/Dockerfile
            title: ironclaw
            runner: ubuntu-latest
            platform: linux/amd64
            goarch: amd64
          - image: ghcr.io/zackerydev/ironclaw
            dockerfile: docker/ironclaw/Dockerfile
            title: ironclaw
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            goarch: arm64
          - image: ghcr.io/zackerydev/theclawmachine-toolbox
            dockerfile: docker/toolbox/Dockerfile
            title: theclawmachine-toolbox
            runner: ubuntu-latest
            platform: linux/amd64
            goarch: amd64
          - image: ghcr.io/zackerydev/theclawmachine-toolbox
            dockerfile: docker/toolbox/Dockerfile
            title: theclawmachine-toolbox
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2

      - name: Compute release version
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Build release binary for clawmachine image
        if: matrix.image == 'ghcr.io/zackerydev/theclawmachine'
        run: |
          mkdir -p "linux/${{ matrix.goarch }}"
          cd control-plane
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags "-s -w -X main.version=${{ steps.version.outputs.value }}" \
            -o "../linux/${{ matrix.goarch }}/clawmachine" ./cmd/clawmachine

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push ${{ matrix.image }} (${{ matrix.platform }})
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ steps.version.outputs.value }}-${{ matrix.goarch }}
            ${{ matrix.image }}:latest-${{ matrix.goarch }}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.version=${{ steps.version.outputs.value }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.title }}-${{ matrix.goarch }}
          cache-to: type=gha,scope=${{ matrix.title }}-${{ matrix.goarch }},mode=max

  release-images-manifests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: release-images
    strategy:
      fail-fast: false
      matrix:
        image:
          - ghcr.io/zackerydev/theclawmachine
          - ghcr.io/zackerydev/openclaw
          - ghcr.io/zackerydev/picoclaw
          - ghcr.io/zackerydev/ironclaw
          - ghcr.io/zackerydev/theclawmachine-toolbox
    steps:
      - name: Compute release version
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Publish multi-arch manifest tags
        run: |
          docker buildx imagetools create \
            -t "${{ matrix.image }}:${{ steps.version.outputs.value }}" \
            "${{ matrix.image }}:${{ steps.version.outputs.value }}-amd64" \
            "${{ matrix.image }}:${{ steps.version.outputs.value }}-arm64"

          docker buildx imagetools create \
            -t "${{ matrix.image }}:latest" \
            "${{ matrix.image }}:latest-amd64" \
            "${{ matrix.image }}:latest-arm64"

  release-chart:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Package charts
        run: |
          mkdir -p .cr-release-packages
          for chart in control-plane/charts/*/; do
            if [ ! -f "${chart}Chart.yaml" ]; then
              continue
            fi
            helm package "$chart" -d .cr-release-packages/
          done

      - name: Login to GHCR for Helm OCI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Push charts to GHCR OCI
        run: |
          for pkg in .cr-release-packages/*.tgz; do
            helm push "$pkg" oci://ghcr.io/zackerydev/theclawmachine/charts
          done
