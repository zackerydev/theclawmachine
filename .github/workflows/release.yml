name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  pages: write

jobs:
  release-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: latest
          args: release --clean
          workdir: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  release-chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Package charts
        run: |
          mkdir -p .cr-release-packages
          for chart in control-plane/charts/*/; do
            helm package "$chart" -d .cr-release-packages/
          done
          # Also package the control-plane (clawmachine) chart itself
          helm package control-plane/charts/clawmachine/ -d .cr-release-packages/ 2>/dev/null || true

      - name: Upload chart packages to GitHub Releases
        run: |
          cr upload \
            --owner zackerydev \
            --git-repo clawmachine \
            --package-path .cr-release-packages/ \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            --skip-existing
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Update Helm repo index on gh-pages
        run: |
          cr index \
            --owner zackerydev \
            --git-repo clawmachine \
            --package-path .cr-release-packages/ \
            --index-path index.yaml \
            --push \
            --token "${{ secrets.GITHUB_TOKEN }}"
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
